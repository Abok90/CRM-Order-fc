        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f0f4f8; 
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            width: 1.5rem; height: 1.5rem;
            border: 2px solid #cbd5e1; border-radius: 0.4rem;
            display: grid; place-content: center; cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .custom-checkbox::before {
            content: ""; width: 0.8rem; height: 0.8rem; transform: scale(0);
            box-shadow: inset 1em 1em white; background-color: white;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked { background-color: #4f46e5; border-color: #4f46e5; }
        .custom-checkbox:checked::before { transform: scale(1); }
        
        /* تصميم مدخلات الإكسيل الداخلي */
        .excel-input {
            width: 100%; min-width: 90px; padding: 8px;
            border: 1px solid transparent; background: transparent;
            outline: none; font-size: 0.9rem; transition: all 0.2s;
        }
        .excel-input:focus { background: #f0f9ff; border-color: #bae6fd; border-radius: 6px; }
        
        .copy-animation { animation: pulse-copy 0.4s ease-out; }
        @keyframes pulse-copy {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); background-color: #dcfce7; color: #166534; border-color: #86efac; }
            100% { transform: scale(1); }
        }
        
        /* تأثير دخول الإشعارات */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideDown 0.3s ease-out forwards; }
    </style>
</head>

            const [authError, setAuthError] = useState('');

            const [currentTab, setCurrentTab] = useState('dashboard');

            // -- نوافذ (Modals) للموبايل --

            // -- البيانات --

            const ordersRef = useRef([]); 
            const [usersList, setUsersList] = useState([]);
            
            // -- الإشعارات وسجل النشاطات --

            const [activityLogs, setActivityLogs] = useState([]);
            
            // -- الفلاتر الرئيسية للطلبات --
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('الكل');
            const [filterPage, setFilterPage] = useState('الكل');
            const [dateFrom, setDateFrom] = useState('');

                media_buyer: 'مدير الميديا باير',

            };

            const initialOrderState = {

            };
            const [newOrder, setNewOrder] = useState(initialOrderState);

            const [bulkOrders, setBulkOrders] = useState(Array(5).fill({...emptyBulkRow}));
            const [bulkTargetPage, setBulkTargetPage] = useState(pages[0]);

            // 4. دوال الاتصال الأساسية والصلاحيات
            // ==========================================

            const isSuperAdmin = SUPER_ADMIN_ROLES.includes(userRole?.role);
            const isPageManager = userRole?.role === 'page_manager';

            const availablePages = useMemo(() => {
                if (!userRole) return [];
                if (isSuperAdmin) return pages;
                if (!userRole.assigned_page) return [];
                return pages.filter(p => userRole.assigned_page.includes(p));
            }, [userRole, isSuperAdmin]);

            const fetchUserRole = async (userId, userEmail) => {
                try {
                    const { data, error } = await supabase.from('user_roles').select('*').eq('id', userId).maybeSingle();
                    if (data) {
                        setUserRole(data);
                        if (!SUPER_ADMIN_ROLES.includes(data.role) && data.assigned_page) {
                            setFilterPage('الكل');
                            const firstPage = data.assigned_page.split(',').filter(Boolean)[0] || pages[0];
                            setNewOrder(prev => ({...prev, page: firstPage}));
                            setImportTargetPage(firstPage);
                            setBulkTargetPage(firstPage);
                        }
                    } else {
                        // لأي مستخدم جديد يتم إضافته
                        const { count } = await supabase.from('user_roles').select('*', { count: 'exact', head: true });
                        const isFirstUser = count === 0;
                        const role = isFirstUser ? 'admin' : 'agent';
                        const name = isFirstUser ? 'المدير' : (userEmail ? userEmail.split('@')[0] : 'موظف جديد');

                        const newRoleData = { id: userId, name, role, is_approved: isApproved };
                        const { data: newRole, error: insertError } = await supabase.from('user_roles').insert([newRoleData]).select().maybeSingle();
                        setUserRole(newRole || newRoleData);
                    }
                } catch (error) { 
                    setUserRole({ id: userId, name: 'مدير طوارئ', role: 'admin', is_approved: true }); 
                } finally { 
                    setAuthLoading(false); 
                }
            };

            const togglePerm = async (userId, field, value) => {
                try {
                    await supabase.from('user_roles').update({ [field]: value }).eq('id', userId);
                    fetchUsersList();
                } catch(e) { console.error(e); }
            };

            const fetchOrdersData = useCallback(async () => {
                if (!user) return;
                setLoadingDB(true);
                try {
                    const { data, error } = await supabase.from('orders').select('*').limit(3000); 
                    if (error) throw error;
                    if (data) {
                        const sortedData = data.sort((a, b) => {
                            const timeA = new Date(a.created_at || a.createdAt || a.date || 0).getTime() || 0;
                            const timeB = new Date(b.created_at || b.createdAt || b.date || 0).getTime() || 0;
                            return timeB - timeA;
                        });
                        const safeOrders = sortedData.map(o => ({
                            ...o,
                            productPrice: Number(o.productPrice) || 0,
                            shippingPrice: Number(o.shippingPrice) || 0
                        }));
                        setOrders(safeOrders);
                        ordersRef.current = safeOrders;
                    }
                } catch (error) { 
                    console.error("Fetch orders error:", error);
                } finally { 
                    setLoadingDB(false);
                }
            }, [user]);

            const fetchUsersList = async () => {
                try {
                    const { data, error } = await supabase.from('user_roles').select('*');
                    if (!error && data) setUsersList(data);
                } catch (error) {}
            };

            const fetchActivityLogs = async () => {
                if(!isSuperAdmin && !isPageManager) return;
                try {
                    const { data, error } = await supabase.from('activity_logs').select('*').order('created_at', { ascending: false }).limit(2000);
                    if (!error && data) setActivityLogs(data);
                } catch(e) { console.error("Logs error:", e); }
            };

            const searchDatabase = async (searchText) => {
                if (!user || String(searchText).trim() === '') { setSearchResults([]); return; }
                setIsSearchingDb(true);
                try {
                    const { data, error } = await supabase.from('orders').select('*')
                        .or(`customer.ilike.%${searchText}%,phone.ilike.%${searchText}%,id.ilike.%${searchText}%,"trackingNumber".ilike.%${searchText}%`)
                        .limit(1000); 
                    if (error) throw error;
                    setSearchResults(data || []);
                } catch (err) { 
                    console.error("Error searching:", err); 
                } finally { 
                    setIsSearchingDb(false); 
                }
            };

            const logActivity = async (actionDesc, relatedOrderId) => {
                if (!userRole) return;
                try {
                    await supabase.from('activity_logs').insert([{
                        user_name: userRole.name,
                        action: actionDesc,
                        order_id: relatedOrderId
                    }]);
                } catch(e) { console.error("Failed to log activity:", e); }
            };

            // ==========================================
            // 5. الـ useEffects
            // ==========================================

            useEffect(() => {
                let mounted = true;
                const initSession = async () => {
                    try {
                        const { data: { session }, error } = await supabase.auth.getSession();
                        if (mounted) {
                            if (session?.user) {
                                setUser(session.user);
                                await fetchUserRole(session.user.id, session.user.email);
                            } else {
                                setAuthLoading(false);
                            }
                        }
                    } catch (err) {
                        if (mounted) setAuthLoading(false);
                    }
                };
                initSession();

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    if (mounted) {
                        if (session?.user) {
                            setUser(session.user);
                            fetchUserRole(session.user.id, session.user.email);
                        } else {
                            setUser(null);
                            setUserRole(null);
                            setOrders([]);
                            setAuthLoading(false);
                        }
                    }
                });

                return () => {
                    mounted = false;
                    subscription?.unsubscribe();
                };
            }, []);

            useEffect(() => {
                if (user && userRole && userRole.is_approved) {
                    fetchOrdersData();
                    if (isSuperAdmin || isPageManager) {
                        fetchUsersList();
                        fetchActivityLogs();
                    }
                    
                    const logSub = supabase.channel('logs-realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'activity_logs' }, (payload) => {
                        const newLog = payload.new;
                        setToasts(prev => [newLog, ...prev]);
                        setTimeout(() => {
                            setToasts(prev => prev.filter(t => t.id !== newLog.id));
                        }, 4000);
                        
                        if(isSuperAdmin || isPageManager) {
                            setActivityLogs(prev => [newLog, ...prev]);
                        }
                    }).subscribe();

                    return () => supabase.removeChannel(logSub);
                }
            }, [user, userRole, fetchOrdersData, isSuperAdmin, isPageManager]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchQuery, filterStatus, filterPage, dateFrom, dateTo]);

            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (searchQuery.length > 2) searchDatabase(searchQuery);
                    else setSearchResults([]); 
                }, 800); 
                return () => clearTimeout(delayDebounceFn);
            }, [searchQuery]);

            useEffect(() => {
                setLogCurrentPage(1);
            }, [logSearchQuery, logFilterUser, logDateFrom, logDateTo, logsPerPage]);

            // ==========================================
            // 6. تجهيز الفلاتر وتجميع السجلات (useMemos)
            // ==========================================

            const visibleUsers = useMemo(() => {
                if (!usersList.length) return [];
                if (isSuperAdmin) return usersList;
                if (isPageManager) {
                    return usersList.filter(u => {
                        if (u.role !== 'agent') return false;
                        if (!u.assigned_page) return true; // Show unassigned so manager can assign them
                        const myPages = userRole?.assigned_page ? userRole.assigned_page.split(',').filter(Boolean) : [];
                        const theirPages = u.assigned_page.split(',').filter(Boolean);
                        return theirPages.some(p => myPages.includes(p));
                    });
                }
                return [];
            }, [usersList, isSuperAdmin, isPageManager, userRole]);

            const allVisibleOrders = useMemo(() => {
                if (searchResults.length === 0) return orders;
                const combined = [...orders, ...searchResults];
                const unique = new Map();
                combined.forEach(o => unique.set(o.id, o));
                return Array.from(unique.values()).sort((a, b) => {
                    const timeA = new Date(a.created_at || a.createdAt || a.date || 0).getTime() || 0;
                    const timeB = new Date(b.created_at || b.createdAt || b.date || 0).getTime() || 0;
                    return timeB - timeA;
                });
            }, [orders, searchResults]);

            const filteredOrders = useMemo(() => {
                return allVisibleOrders.filter(order => {
                    const search = String(searchQuery).toLowerCase();
                    const matchesSearch = String(order.customer || '').toLowerCase().includes(search) || 
                                          String(order.phone || '').toLowerCase().includes(search) || 
                                          String(order.id || '').toLowerCase().includes(search) || 
                                          String(order.trackingNumber || '').toLowerCase().includes(search);
                                          
                    const matchesStatus = filterStatus === 'الكل' || order.status === filterStatus;
                    const matchesPage = filterPage === 'الكل' ? true : order.page === filterPage;
                    const matchesRole = isSuperAdmin ? true : (availablePages.includes(order.page));
                    const matchesDateFrom = !dateFrom || (order.date && order.date >= dateFrom);
                    const matchesDateTo = !dateTo || (order.date && order.date <= dateTo);

                    return matchesSearch && matchesStatus && matchesPage && matchesRole && matchesDateFrom && matchesDateTo;
                });
            }, [allVisibleOrders, searchQuery, filterStatus, filterPage, isSuperAdmin, availablePages, dateFrom, dateTo]);

            const displayedOrders = useMemo(() => {
                if (ordersPerPage === 'All') return filteredOrders;
                const start = (currentPage - 1) * ordersPerPage;
                return filteredOrders.slice(start, start + ordersPerPage);
            }, [filteredOrders, currentPage, ordersPerPage]);

            const totalPages = ordersPerPage === 'All' ? 1 : Math.ceil(filteredOrders.length / ordersPerPage);

            const statsFilteredOrders = useMemo(() => {
                return filteredOrders.filter(order => (!statsDateFrom || order.date >= statsDateFrom) && (!statsDateTo || order.date <= statsDateTo));
            }, [filteredOrders, statsDateFrom, statsDateTo]);

            const globalStats = useMemo(() => {
                const delivered = filteredOrders.filter(o => o.status === 'تم');
                return {
                    total: filteredOrders.length,
                    new: filteredOrders.filter(o => ['جاري التحضير', 'مراجعة', 'تاجيل'].includes(o.status)).length,
                    processing: filteredOrders.filter(o => ['الشحن', 'استبدال', 'اعادة ارسال'].includes(o.status)).length,
                    delivered: delivered.length,
                    revenue: delivered.reduce((sum, o) => sum + (Number(o.productPrice) || 0) + (Number(o.shippingPrice) || 0), 0)
                };
            }, [filteredOrders]);

            // --- فلاتر وتجميع سجلات النشاط بالأيام ---
            const filteredLogs = useMemo(() => {
                return activityLogs.filter(log => {
                    const search = logSearchQuery.toLowerCase();
                    const matchesSearch = (log.user_name || '').toLowerCase().includes(search) ||
                                          (log.action || '').toLowerCase().includes(search) ||
                                          (log.order_id || '').toLowerCase().includes(search);

                    const matchesUser = logFilterUser === 'الكل' || log.user_name === logFilterUser;

                    const logDate = new Date(log.created_at).toISOString().split('T')[0];
                    const matchesDateFrom = !logDateFrom || logDate >= logDateFrom;
                    const matchesDateTo = !logDateTo || logDate <= logDateTo;

                    return matchesSearch && matchesUser && matchesDateFrom && matchesDateTo;
                });
            }, [activityLogs, logSearchQuery, logFilterUser, logDateFrom, logDateTo]);

            const displayedLogs = useMemo(() => {
                if (logsPerPage === 'All') return filteredLogs;
                const start = (logCurrentPage - 1) * logsPerPage;
                return filteredLogs.slice(start, start + logsPerPage);
            }, [filteredLogs, logCurrentPage, logsPerPage]);

            const logTotalPages = logsPerPage === 'All' ? 1 : Math.ceil(filteredLogs.length / logsPerPage);

            const groupedDisplayedLogs = useMemo(() => {
                return displayedLogs.reduce((acc, log) => {
                    const dateObj = new Date(log.created_at);
                    const dateStr = dateObj.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    if (!acc[dateStr]) acc[dateStr] = [];
                    acc[dateStr].push(log);
                    return acc;
                }, {});
            }, [displayedLogs]);

            // ==========================================
            // 7. دوال واجهة المستخدم والأكشن (UI Handlers)
            // ==========================================

            const resetFilters = () => { 
                setSearchQuery(''); setFilterStatus('الكل'); 
                setFilterPage('الكل'); 
                setDateFrom(''); setDateTo(''); 
                setSearchResults([]);
                setCurrentPage(1);
            };

            const resetLogFilters = () => {
                setLogSearchQuery('');
                setLogFilterUser('الكل');
                setLogDateFrom('');
                setLogDateTo('');
                setLogCurrentPage(1);
            };

            const navigateToFilteredOrders = (page, status) => { 
                setFilterPage(page); setFilterStatus(status); setCurrentTab('orders'); 
            };

            const handleSelectAll = (e) => { 
                e.target.checked ? setSelectedOrders(displayedOrders.map(o => o.id)) : setSelectedOrders([]); 
            };
            
            const handleSelectOrder = (id) => { 
                selectedOrders.includes(id) ? setSelectedOrders(selectedOrders.filter(o => o !== id)) : setSelectedOrders([...selectedOrders, id]); 
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setAuthLoading(true); setAuthError('');
                try {
                    const { error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
                    if (error) throw error;
                } catch (error) { 
                    setAuthError(error.message === 'Invalid login credentials' ? 'الإيميل أو كلمة المرور غير صحيحة.' : 'خطأ: ' + error.message); 
                    setAuthLoading(false); 
                } 
            };

            const handleLogout = async () => { 
                setAuthLoading(true);
                try { await supabase.auth.signOut(); } catch(e) {}
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.replace(window.location.pathname); 
            };

            const handleAddOrEditOrder = async (e) => {
                e.preventDefault(); 
                if (!user) return;

                if (!isEditing && userRole?.role === 'agent' && (!userRole.assigned_page || !userRole.assigned_page.includes(newOrder.page))) {
                    alert(`صلاحياتك لا تسمح بالإضافة في هذه الصفحة.`);
                    return;
                }

                if (!newOrder.customer || String(newOrder.customer).trim() === '') return alert("يرجى إدخال اسم العميل.");
                if (!newOrder.phone || String(newOrder.phone).trim() === '') return alert("يرجى إدخال رقم الهاتف.");
                if (!newOrder.address || String(newOrder.address).trim() === '') return alert("يرجى إدخال العنوان.");
                if (!newOrder.item || String(newOrder.item).trim() === '') return alert("يرجى إدخال تفاصيل المنتج.");

                const finalOrderId = newOrder.id && String(newOrder.id).trim() !== '' ? String(newOrder.id).trim() : `ORD-${Date.now().toString().slice(-6)}`;
                const finalDate = newOrder.date && String(newOrder.date).trim() !== '' ? newOrder.date : new Date().toISOString().split('T')[0];
                
                const originalOrderData = isEditing ? orders.find(o => o.id === originalOrderId) : null;
                const isShipped = isEditing && (originalOrderData?.status === 'الشحن' || originalOrderData?.trackingNumber);
                
                let finalNotes = newOrder.notes || '';
                if (isEditing && userRole?.role === 'agent' && isShipped) {
                    if (!userRole.can_edit_after_shipping) {
                        return alert("عفواً، لا تملك صلاحية تعديل طلب تم تحويله إلى الشحن.");
                    }
                    if (!editReason || editReason.trim() === '') {
                        return alert("يرجى كتابة سبب التعديل الخاص بك في الخانة الحمراء لكي يتم حفظ الأوردر.");
                    }
                    const timeNow = new Date().toLocaleString('ar-EG');
                    finalNotes = (finalNotes ? finalNotes + '\n' : '') + `[تعديل بعد الشحن - ${timeNow}]: ${editReason}`;
                }

                const orderPayload = { 
                    id: finalOrderId, 
                    customer: newOrder.customer,
                    address: newOrder.address,
                    phone: newOrder.phone,
                    page: newOrder.page || availablePages[0] || pages[0],
                    item: newOrder.item,
                    status: newOrder.status || 'جاري التحضير',
                    notes: finalNotes,
                    productPrice: Number(newOrder.productPrice) || 0, 
                    shippingPrice: Number(newOrder.shippingPrice) || 0,
                    trackingNumber: newOrder.trackingNumber || '',
                    date: finalDate,
                    user_id: user.id
                };

                try {
                    if (isEditing) {
                        if (originalOrderId !== finalOrderId) {
                            await supabase.from('orders').insert([orderPayload]);
                            await supabase.from('orders').delete().eq('id', originalOrderId);
                        } else {
                            const updatePayload = { ...orderPayload };
                            delete updatePayload.id; 
                            await supabase.from('orders').update(updatePayload).eq('id', finalOrderId);
                        }
                        
                        let changes = [];
                        if(originalOrderData.status !== orderPayload.status) changes.push(`الحالة إلى "${orderPayload.status}"`);
                        if(originalOrderData.trackingNumber !== orderPayload.trackingNumber) changes.push(`رقم البوليصة`);
                        let actDesc = changes.length > 0 ? `تعديل (${changes.join('، ')})` : 'تعديل بيانات الأوردر';
                        logActivity(actDesc, finalOrderId);
                        
                        alert("تم التعديل بنجاح!");
                        closeModal();
                    } else {
                        const { error } = await supabase.from('orders').insert([orderPayload]);
                        if (error) throw error;
                        
                        logActivity('إضافة أوردر جديد', finalOrderId);
                        closeModal();
                        setSuccessOrderMessage(orderPayload); 
                    }
                    fetchOrdersData(); 
                } catch (error) { 
                    alert(`فشل الحفظ!\nالسبب: ${error.message}\nتأكد من عدم تكرار رقم الطلب.`); 
                }
            };

            const handleStatusChange = async (id, newStatus) => {
                if (!user) return;
                
                const orderToUpdate = orders.find(o => o.id === id);
                const isShipped = orderToUpdate?.status === 'الشحن' || orderToUpdate?.trackingNumber;
                if (userRole?.role === 'agent' && isShipped) {
                    return alert("عفواً، لا يمكنك تغيير حالة طلب تم شحنه من هنا. يرجى الضغط على زر 'تعديل' لكتابة سبب التعديل أولاً.");
                }

                const previousOrders = [...orders];
                setOrders(prev => prev.map(o => o.id === id ? { ...o, status: newStatus } : o));
                if(viewOrder && viewOrder.id === id) setViewOrder({...viewOrder, status: newStatus});

                try {
                    const { error } = await supabase.from('orders').update({ status: newStatus }).eq('id', id);
                    if(error) throw error;
                    logActivity(`تغيير حالة الأوردر إلى "${newStatus}"`, id);
                } catch (error) { 
                    alert("خطأ في التحديث: " + error.message);
                    setOrders(previousOrders);
                }
            };

            const saveQuickUpdate = async () => {
                 if (!user || !viewOrder) return;
                 
                 const isShipped = viewOrder.status === 'الشحن' || viewOrder.trackingNumber;
                 if (userRole?.role === 'agent' && isShipped) {
                     return alert("عفواً، لا يمكنك التعديل السريع لطلب تم شحنه. يرجى الضغط على زر 'تعديل' لكتابة سبب التعديل.");
                 }

                 let changes = [];
                 if (quickStatus !== viewOrder.status) changes.push(`الحالة إلى "${quickStatus}"`);
                 if (quickTracking !== (viewOrder.trackingNumber || '')) changes.push(`رقم البوليصة إلى "${quickTracking}"`);
                 
                 if (changes.length === 0) return alert("لم تقم بأي تعديل للحفظ!");

                 let actionDesc = `تعديل ${changes.join(' و ')}`;

                 try {
                     const { error } = await supabase.from('orders').update({ 
                         trackingNumber: quickTracking, 
                         status: quickStatus 
                     }).eq('id', viewOrder.id);
                     
                     if(error) throw error;
                     
                     logActivity(actionDesc, viewOrder.id);
                     setViewOrder({...viewOrder, trackingNumber: quickTracking, status: quickStatus});
                     setOrders(prev => prev.map(o => o.id === viewOrder.id ? { ...o, trackingNumber: quickTracking, status: quickStatus } : o));
                     alert("تم الحفظ بنجاح!");
                 } catch (error) { 
                     alert("فشل الحفظ: " + error.message); 
                 }
            };

            const handleDeleteOrder = async (id) => {
                if (!user) return;
                if (!window.confirm(`هل أنت متأكد من مسح الطلب (${id}) نهائياً؟`)) return;
                
                const exactId = String(id); 
                const previousOrders = [...orders];
                setOrders(prev => prev.filter(o => o.id !== exactId));

                try {
                    const { error } = await supabase.from('orders').delete().eq('id', exactId);
                    if(error) throw error;
                    logActivity(`مسح الأوردر نهائياً`, exactId);
                } catch (error) { 
                    alert(`فشل المسح: ${error.message}`);
                    setOrders(previousOrders);
                }
            };

            const handleDeleteMultipleOrders = async () => {
                if (!user || selectedOrders.length === 0) return;
                if (!window.confirm(`هل أنت متأكد من مسح ${selectedOrders.length} طلبات نهائياً؟`)) return;
                
                setIsDeletingMultiple(true);
                const previousOrders = [...orders];
                const idsToDelete = [...selectedOrders];
                
                setOrders(prev => prev.filter(o => !idsToDelete.includes(o.id)));
                setSelectedOrders([]); 

                try {
                    const { error } = await supabase.from('orders').delete().in('id', idsToDelete);
                    if (error) throw error;
                    logActivity(`مسح ${idsToDelete.length} طلبات معاً`, 'متعدد');
                } catch (error) { 
                    alert(`فشل المسح الجماعي: ${error.message}`); 
                    setOrders(previousOrders);
                } finally { 
                    setIsDeletingMultiple(false); 
                }
            };

            // ==========================================
            // 8. الإضافة المتعددة
            // ==========================================
            
            const handleBulkChange = (index, field, value) => {
                const newBulk = [...bulkOrders];
                newBulk[index] = { ...newBulk[index], [field]: value };
                if (field === 'trackingNumber' && value.trim() !== '') newBulk[index].status = 'الشحن';
                setBulkOrders(newBulk);
            };

            const addBulkRow = () => setBulkOrders([...bulkOrders, { ...emptyBulkRow }]);

            const saveBulkOrders = async () => {
                if (!user) return;
                const validRows = bulkOrders.filter(row => row.customer && row.customer.trim() !== '');
                if (validRows.length === 0) return alert("يرجى إدخال اسم عميل واحد على الأقل في الجدول.");

                setLoadingDB(true);
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const ordersToInsert = validRows.map((row, idx) => {
                        const finalId = row.id && row.id.trim() !== '' ? row.id.trim() : `ORD-${Date.now().toString().slice(-5)}${idx}`;
                        return {
                            id: finalId, customer: row.customer, address: row.address, phone: row.phone,
                            page: bulkTargetPage || availablePages[0], item: row.item, status: row.status || 'جاري التحضير',
                            notes: row.notes, productPrice: Number(row.productPrice) || 0, shippingPrice: Number(row.shippingPrice) || 0,
                            trackingNumber: row.trackingNumber || '', date: row.date && row.date.trim() !== '' ? row.date : today,
                            user_id: user.id
                        };
                    });

                    const { error } = await supabase.from('orders').insert(ordersToInsert);
                    if (error) throw error;
                    
                    logActivity(`إضافة مجموعة طلبات (${ordersToInsert.length} طلب)`, 'متعدد');
                    alert(`تمت إضافة ${ordersToInsert.length} طلبات بنجاح!`);
                    setIsBulkModalOpen(false); setBulkOrders(Array(5).fill({...emptyBulkRow}));
                    fetchOrdersData(); 
                } catch (err) { alert(`فشل الحفظ الجماعي: ${err.message}`); } finally { setLoadingDB(false); }
            };

            // ==========================================
            // 9. النوافذ المنبثقة والمساعدات
            // ==========================================
            
            const generateCustomerMsg = (order) => {
                if(!order) return "";
                const total = (Number(order.productPrice) || 0) + (Number(order.shippingPrice) || 0);
                let msg = `أهلاً بك يا فندم في ${order.page} 🌸\n\nملخص طلبك:\n------------------\nرقم الطلب: ${order.id}\n`;
                if (order.trackingNumber && order.trackingNumber.trim() !== '') msg += `رقم البوليصة: ${order.trackingNumber}\n`;
                msg += `المنتج: ${order.item}\nالإجمالي المطلوب: ${total} ج.م (شامل الشحن)\nالعنوان: ${order.address}\n\nيتم تجهيز طلبك الآن، وفي حالة وجود أي استفسار يسعدنا تواصلك معنا.`;
                return msg;
            };

            const generateShippingMsg = (order) => {
                if(!order) return "";
                const total = (Number(order.productPrice) || 0) + (Number(order.shippingPrice) || 0);
                let msg = `رقم الأوردر: ${order.id}\n`;
                if (order.trackingNumber && order.trackingNumber.trim() !== '') msg += `رقم البوليصة: ${order.trackingNumber}\n`;
                msg += `الاسم: ${order.customer}\nالموبايل: ${order.phone}\nالعنوان: ${order.address}\nالمنتج: ${order.item}\nالمبلغ المطلوب: ${total}\nالملاحظات: ${order.notes || 'لا يوجد'}\nالصفحة: ${order.page}`;
                return msg;
            };
            
            const openAddModal = () => { setEditReason(''); setNewOrder({ ...initialOrderState, page: availablePages[0] || pages[0] }); setIsEditing(false); setOriginalOrderId(null); setIsAddModalOpen(true); };
            const openEditModal = (order) => { 
                const isShipped = order.status === 'الشحن' || order.trackingNumber;
                if (userRole?.role === 'agent' && isShipped && !userRole.can_edit_after_shipping) {
                    return alert("عفواً، لا تملك صلاحية تعديل هذا الطلب لأنه تم تحويله للشحن.");
                }
                setEditReason(''); setNewOrder(order); setIsEditing(true); setOriginalOrderId(order.id); setIsAddModalOpen(true); 
            };
            const closeModal = () => { setIsAddModalOpen(false); setIsEditing(false); setOriginalOrderId(null); setEditReason(''); setNewOrder(initialOrderState); };
            const openViewModal = (order) => { setViewOrder(order); setQuickTracking(order.trackingNumber || ''); setQuickStatus(order.status || 'جاري التحضير'); setIsViewModalOpen(true); };
            const closeViewModal = () => { setIsViewModalOpen(false); setViewOrder(null); setCopiedType(''); setQuickTracking(''); };

            const copyToClipboard = (text, type) => {
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setCopiedType(type); setTimeout(() => setCopiedType(''), 2000);
            };

            const exportSelectedToCSV = () => {
                if (selectedOrders.length === 0) return;
                const toExport = filteredOrders.filter(o => selectedOrders.includes(o.id));
                const headers = ['رقم الطلب', 'اسم العميل', 'رقم الموبايل', 'العنوان', 'الصفحة', 'المنتج/الوصف', 'حالة الطلب', 'سعر المنتج', 'سعر الشحن', 'رقم البوليصة', 'تاريخ الطلب', 'الملاحظات'];
                const rows = toExport.map(o => [`"${String(o.id || '')}"`, `"${String(o.customer || '').replace(/"/g, '""')}"`, `"${String(o.phone || '').replace(/"/g, '""')}"`, `"${String(o.address || '').replace(/"/g, '""')}"`, `"${String(o.page || '').replace(/"/g, '""')}"`, `"${String(o.item || '').replace(/"/g, '""')}"`, `"${String(o.status || '')}"`, Number(o.productPrice) || 0, Number(o.shippingPrice) || 0, `"${String(o.trackingNumber || '').replace(/"/g, '""')}"`, `"${String(o.date || '')}"`, `"${String(o.notes || '').replace(/"/g, '""')}"`].join(','));
                const content = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `نسخة_احتياطية_طلبات_${new Date().toISOString().split('T')[0]}.csv`; link.click();
            };

            const exportShippingCSV = () => {
                if (selectedOrders.length === 0) return;
                const toExport = filteredOrders.filter(o => selectedOrders.includes(o.id));
                const headers = ['رقم الاوردر', 'اسم الصفحه', 'اسم العميل', 'موبايل العميل', 'ملاحظات', 'المنطقه', 'العنوان', 'محتوي الشحنه', 'الكميه', 'قيمة الشحنة'];
                const rows = toExport.map(o => {
                    const total = (Number(o.productPrice) || 0) + (Number(o.shippingPrice) || 0);
                    return [
                        `"${String(o.id || '')}"`, `"${String(o.page || '').replace(/"/g, '""')}"`, `"${String(o.customer || '').replace(/"/g, '""')}"`, `"${String(o.phone || '').replace(/"/g, '""')}"`, `"${String(o.notes || '').replace(/"/g, '""')}"`, `"العنوان"`, `"${String(o.address || '').replace(/"/g, '""')}"`, `"${String(o.item || '').replace(/"/g, '""')}"`, `1`, total 
                    ].join(',');
                });
                const content = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `شيت_شحن_${new Date().toISOString().split('T')[0]}.csv`; link.click();
                logActivity(`تنزيل شيت شحن (${toExport.length} طلب)`, 'متعدد');
            };

            const parseCSV = (text) => {
                const result = []; let row = []; let inQuotes = false; let currentVal = '';
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (inQuotes) { if (char === '"') { if (text[i+1] === '"') { currentVal += '"'; i++; } else { inQuotes = false; } } else { currentVal += char; } } 
                    else { if (char === '"') { inQuotes = true; } else if (char === ',') { row.push(currentVal.trim()); currentVal = ''; } else if (char === '\n' || char === '\r') { row.push(currentVal.trim()); result.push(row); row = []; currentVal = ''; if (char === '\r' && text[i+1] === '\n') i++; } else { currentVal += char; } }
                }
                if (currentVal || row.length) { row.push(currentVal.trim()); result.push(row); }
                return result.filter(r => r.some(cell => cell && cell.trim() !== '')); 
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { const text = event.target.result; const parsed = parseCSV(text); if (parsed.length > 0) { setCsvHeaders(parsed[0]); setCsvData(parsed.slice(1)); } };
                reader.readAsText(file, 'UTF-8'); 
            };

                if (!user) return;

                    const uniqueRowsMap = new Map();

                        const row = csvData[i];

                        let rawId = getVal('id'); let orderId = rawId !== '' ? rawId : `ORD-IMP-${Date.now()}-${i}`;
                        orderId = String(orderId).replace(/[\/\\?%*:|"<>#\s]/g, '-').trim();

                        const priceRaw = getVal('productPrice') || '0'; const shipRaw = getVal('shippingPrice') || '0';
                        const cleanProductPrice = parseFloat(String(priceRaw).replace(/[^\d.-]/g, '')) || 0;

                        let importedStatus = getVal('status');

                        let rawDate = getVal('date'); let finalDate = new Date().toISOString().split('T')[0];

                            let cleanDateStr = String(rawDate).replace(/\//g, '-').replace(/\./g, '-');
                            let parsedDate = new Date(cleanDateStr);
                            if (!isNaN(parsedDate.getTime())) finalDate = parsedDate.toISOString().split('T')[0];
                        }

                        const orderData = {
                            id: orderId, customer: getVal('customer') || 'غير محدد', phone: getVal('phone') || '',
                            address: getVal('address') || '', notes: getVal('notes') || '', page: importTargetPage, 
                            item: getVal('item') || 'مستورد من إكسيل', productPrice: cleanProductPrice,
                            shippingPrice: cleanShippingPrice, trackingNumber: getVal('trackingNumber') || '',
                            status: importedStatus, date: finalDate, user_id: user.id
                        };
                        uniqueRowsMap.set(orderId, orderData);
                    }
                    
                    const uniqueDataToInsert = Array.from(uniqueRowsMap.values());
                    validRecordsCount = uniqueDataToInsert.length;

                    setImportStatusText(`جاري رفع ${validRecordsCount} طلب للسيرفر...`);

                    const chunkSize = 200; 
                    for (let i = 0; i < uniqueDataToInsert.length; i += chunkSize) {
                        const chunk = uniqueDataToInsert.slice(i, i + chunkSize);
                        const { error } = await supabase.from('orders').upsert(chunk, { onConflict: 'id' });
                        if (error) throw error;
                        setImportProgress(Math.round(((i + chunk.length) / uniqueDataToInsert.length) * 100));
                    }

                    logActivity(`رفع شيت إكسيل (${validRecordsCount} طلب)`, 'متعدد');
                    setImportStatusText("تم الرفع بنجاح!");
                    fetchOrdersData(); 
                    setIsImporting(false); setIsImportModalOpen(false); setCsvHeaders([]); setCsvData([]);
                    alert(`تم استيراد ${validRecordsCount} أوردر بنجاح!`);
                } catch (err) {
                    alert(`فشل الرفع: ${err.message}`); 
                    setIsImporting(false);
                }
            };

            const getThemeClasses = (p) => (p === 'عايدة' || p === 'عايدة ويب' ? { btnPrimary: 'bg-pink-600 hover:bg-pink-700 text-white shadow-md shadow-pink-200', textPrimary: 'text-pink-600', border: 'border-pink-200', bgLight: 'bg-pink-50', ringFocus: 'focus:ring-pink-500' } : { btnPrimary: 'bg-purple-600 hover:bg-purple-700 text-white shadow-md shadow-purple-200', textPrimary: 'text-purple-600', border: 'border-purple-200', bgLight: 'bg-purple-50', ringFocus: 'focus:ring-purple-500' });

-3 border-t border-slate-200 flex justify-between text-base md:text-lg items-center"><span className="text-slate-800 font-black">الإجمالي الكلي:</span><span className="font-black text-green-600 bg-green-50 px-2 md:px-3 py-1 rounded-lg border border-green-200 shadow-sm">{pageRevenue} ج.م</span></div></div></div>

                                        <div className="md:col-span-2"><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1">الملحوظات</label><textarea rows="2" placeholder="أي ملحوظات إضافية بخصوص الطلب..." className={`w-full px-3 py-2 md:px-4 md:py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none resize-none transition-shadow font-bold text-xs md:text-sm ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.notes || ''} onChange={e => setNewOrder({...newOrder, notes: e.target.value})}></textarea></div>
                                        <div className="md:col-span-2"><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1">المنتج / الوصف <span className="text-red-500">*</span></label><textarea required rows="2" placeholder="اكتب تفاصيل المنتجات والمقاسات والألوان..." className={`w-full px-3 py-2 md:px-4 md:py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none resize-none transition-shadow font-bold text-xs md:text-sm ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.item} onChange={e => setNewOrder({...newOrder, item: e.target.value})}></textarea></div>
                                        <div className="md:col-span-2"><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1">حالة الطلب</label><select className={`w-full px-3 py-2 md:px-4 md:py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none transition-shadow font-bold text-xs md:text-sm ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.status} onChange={e => setNewOrder({...newOrder, status: e.target.value})}>{orderStatuses.map(status => <option key={status} value={status}>{status}</option>)}</select></div>
                                        <div><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1">سعر الشحن (ج.م) <span className="text-red-500">*</span></label><input required type="number" min="0" className={`w-full px-3 py-2 md:px-4 md:py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none transition-shadow font-black text-sm md:text-lg ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.shippingPrice} onChange={e => setNewOrder({...newOrder, shippingPrice: e.target.value})} /></div>
                                        <div className="relative"><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1">سعر المنتج (ج.م) <span className="text-red-500">*</span></label><div className="relative"><input required type="number" min="0" className={`w-full px-3 py-2 md:px-4 md:py-2.5 pl-10 md:pl-12 bg-slate-50 border border-slate-200 rounded-lg outline-none transition-shadow font-black text-sm md:text-lg ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.productPrice} onChange={e => setNewOrder({...newOrder, productPrice: e.target.value})} /><button type="button" onClick={() => setShowCalc(!showCalc)} className={`absolute left-1.5 md:left-2 top-1/2 -translate-y-1/2 p-1.5 md:p-2 rounded-lg transition-colors bg-white shadow-sm border border-slate-100 ${currentTheme.textPrimary} hover:bg-slate-50`}><IconCalc /></button></div>{showCalc && (<div dir="ltr" className="absolute z-10 bottom-full left-0 mb-2 md:mb-3 bg-white border border-slate-200 shadow-2xl rounded-2xl p-3 md:p-4 w-48 md:w-56 animate-in zoom-in-95"><div className="mb-2 md:mb-3 p-2 md:p-3 bg-slate-100 text-right font-mono text-base md:text-xl rounded-xl border border-slate-200 min-h-[40px] md:min-h-[50px] break-all font-bold shadow-inner text-slate-800">{calcExp || '0'}</div><div className="grid grid-cols-4 gap-1.5 md:gap-2">{calcButtons.map(btn => (<button key={btn} type="button" onClick={() => handleCalcBtn(btn)} className={`p-2 md:p-3 text-xs md:text-sm font-black rounded-xl flex items-center justify-center transition-all ${btn === '=' ? `${currentTheme.btnPrimary} col-span-2 shadow-md` : btn === 'C' ? 'bg-red-100 text-red-600 hover:bg-red-200' : ['+','-','*','/'].includes(btn) ? 'bg-slate-200 text-slate-800 hover:bg-slate-300' : 'bg-slate-50 border border-slate-200 text-slate-800 hover:bg-slate-100 shadow-sm'}`}>{btn}</button>))}</div></div>)}</div>
                                        <div className="md:col-span-2 p-3 md:p-4 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-between text-white shadow-inner"><span className="text-xs md:text-sm font-bold text-slate-300">الإجمالي النهائي المطلوب:</span><span className="font-black text-lg md:text-2xl tracking-wide">{(Number(newOrder.shippingPrice) || 0) + (Number(newOrder.productPrice) || 0)} <span className="text-[10px] md:text-sm font-normal text-slate-400">ج.م</span></span></div>
                                        <div className="md:col-span-2 pt-2 border-t border-slate-200"><label className="block text-[11px] md:text-sm font-black text-slate-700 mb-1 flex items-center gap-1 md:gap-2"><IconCalendar /> 10. تاريخ الطلب</label><input type="date" className={`w-full px-3 py-2 md:px-4 md:py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none transition-shadow font-bold text-xs md:text-sm ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.date || ''} onChange={e => setNewOrder({...newOrder, date: e.target.value})} /><p className="text-[9px] md:text-xs font-bold text-slate-400 mt-1">يُترك فارغاً ليتم تسجيل تاريخ اليوم تلقائياً.</p></div>
                                        
                                        {/* خانة رقم البوليصة مخفية عن الموظف العادي وتظهر للمدير فقط */}
                                        {isSuperAdmin && (
                                            <div className="md:col-span-2 pt-3 md:pt-4 mt-2 border-t-2 border-dashed border-slate-200">
                                                <label className="block text-[11px] md:text-sm font-black text-teal-700 mb-1.5 md:mb-2 flex items-center gap-1 md:gap-2"><IconTruck /> 11. رقم بوليصة الشحن (تتبع الأوردر)</label>
                                                <input type="text" placeholder="يُكتب هنا رقم البوليصة لتتبع الأوردر..." className={`w-full px-3 py-2 md:px-4 md:py-3 border-2 border-teal-200 bg-teal-50/50 rounded-lg md:rounded-xl outline-none transition-shadow font-bold text-xs md:text-sm text-teal-900 focus:ring-2 focus:ring-teal-500`} value={newOrder.trackingNumber || ''} onChange={e => {
                                                    const val = e.target.value;
                                                    setNewOrder(prev => ({...prev, trackingNumber: val, status: val.trim() !== '' ? 'الشحن' : prev.status}));
                                                }} />
                                                <p className="text-[9px] md:text-xs font-bold text-slate-400 mt-1.5 md:mt-2">ملاحظة: سيتم تحويل الحالة إلى الشحن تلقائياً بمجرد إدخال رقم البوليصة.</p>
                                            </div>
                                        )}

                                        {/* خانة سبب التعديل الإجبارية للموظف إذا كان الأوردر مشحون ومعه صلاحية التعديل */}
                                        {isEditing && userRole?.role === 'agent' && (orders.find(o => o.id === originalOrderId)?.status === 'الشحن' || orders.find(o => o.id === originalOrderId)?.trackingNumber) && (
                                            <div className="md:col-span-2 p-3 md:p-4 bg-red-50 border border-red-200 rounded-xl mt-2 animate-in fade-in">
                                                <label className="block text-[11px] md:text-sm font-black text-red-700 mb-1.5">سبب التعديل بعد الشحن (إجباري) <span className="text-red-500">*</span></label>
                                                <input type="text" required className="w-full px-3 py-2 md:px-4 md:py-2.5 bg-white border border-red-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-xs md:text-sm font-bold text-slate-800" value={editReason} onChange={e => setEditReason(e.target.value)} placeholder="اكتبي سبب تعديلك لهذا الأوردر..." />
                                                <p className="text-[9px] md:text-xs font-bold text-red-500 mt-1.5">هذا الأوردر تم شحنه بالفعل، سيتم تسجيل سبب التعديل في الملحوظات لإعلام الإدارة.</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="pt-3 md:pt-4 flex gap-2 md:gap-4">
                                        <button type="submit" className={`flex-1 font-black text-sm md:text-lg py-3 md:py-4 rounded-xl transition-all shadow-md transform hover:-translate-y-1 ${currentTheme.btnPrimary}`}>{isEditing ? 'حفظ التعديلات' : 'تأكيد وإضافة'}</button>
                                        <button type="button" onClick={closeModal} className={`flex-none px-6 md:px-8 font-black py-3 md:py-4 rounded-xl transition-all bg-white border-2 hover:bg-slate-50 text-sm md:text-lg ${currentTheme.border} ${currentTheme.textPrimary}`}>إلغاء</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
