                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="glass-panel shadow-sm px-6 py-4 flex items-center justify-between z-10 sticky top-0 flex-wrap gap-4">
                            <div className="flex items-center gap-4">
                                <button className="md:hidden p-2 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors" onClick={() => setIsSidebarOpen(true)}><IconMenu /></button>
                                <h1 className="text-xl md:text-2xl font-black text-slate-800 drop-shadow-sm">
                                    {currentTab === 'dashboard' && 'نظرة عامة'}
                                    {currentTab === 'orders' && (userRole.role === 'admin' ? 'إدارة كل الطلبات' : `طلبات صفحة ${userRole.assigned_page}`)}
                                    {currentTab === 'pages' && 'الإحصائيات المتقدمة'}
                                    {currentTab === 'users' && 'لوحة الإدارة'}
                                </h1>
                            </div>
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <button onClick={() => setIsImportModalOpen(true)} className="flex-1 md:flex-none bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-sm font-bold"><IconUpload /> <span className="hidden sm:inline">رفع شيت</span></button>
                                <button onClick={openAddModal} className="flex-1 md:flex-none bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white px-5 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md font-bold transform hover:-translate-y-0.5"><IconPlus /> <span className="hidden sm:inline">طلب جديد</span></button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-auto p-4 md:p-8 relative">
                            {/* مؤشر التحميل */}
                            {loadingDB && (
                                <div className="absolute inset-0 bg-white/60 z-10 flex flex-col items-center justify-center backdrop-blur-sm"><div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div></div>
                            )}

                            {/* تبويب إدارة البنات */}
                            {currentTab === 'users' && userRole.role === 'admin' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-indigo-50 border border-indigo-200 p-5 rounded-2xl">
                                        <h2 className="font-black text-indigo-900 text-lg mb-2">إدارة حسابات الموظفين</h2>
                                        <p className="text-sm text-indigo-800 font-bold mb-4">اطلب من الموظف إنشاء حساب، ثم قم بتفعيل الصلاحية وتحديد الصفحة من هنا.</p>
                                        <button onClick={fetchUsersList} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md">تحديث القائمة 🔄</button>
                                    </div>

                                    <div className="glass-panel rounded-2xl shadow-sm border border-white overflow-hidden">
                                        <table className="w-full text-right">
                                            <thead className="bg-slate-800 text-white text-sm"><tr><th className="px-4 py-4 font-bold">الآي دي (ID)</th><th className="px-4 py-4 font-bold">الاسم</th><th className="px-4 py-4 font-bold">الدور</th><th className="px-4 py-4 font-bold">الصفحة المخصصة</th><th className="px-4 py-4 font-bold">الحالة</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100/50">
                                                {usersList.map(u => (
                                                    <tr key={u.id} className="hover:bg-slate-50">
                                                        <td className="px-4 py-3 text-xs font-mono text-slate-400 break-all">{u.id}</td>
                                                        <td className="px-4 py-3 font-bold text-sm"><input type="text" defaultValue={u.name} onBlur={async (e) => { await supabase.from('user_roles').update({name: e.target.value}).eq('id', u.id); }} className="border p-1 rounded text-sm w-full" /></td>
                                                        <td className="px-4 py-3 font-bold text-sm"><select defaultValue={u.role} onChange={async (e) => { await supabase.from('user_roles').update({role: e.target.value}).eq('id', u.id); if(e.target.value === 'admin') await supabase.from('user_roles').update({assigned_page: null}).eq('id', u.id); fetchUsersList(); }} className="border p-1 rounded text-sm"><option value="agent">موظف (Agent)</option><option value="admin">مدير (Admin)</option></select></td>
                                                        <td className="px-4 py-3 font-bold text-sm">{u.role === 'admin' ? <span className="text-slate-400 text-xs">كل الصفحات</span> : (<select defaultValue={u.assigned_page} onChange={async (e) => { await supabase.from('user_roles').update({assigned_page: e.target.value}).eq('id', u.id); }} className="border p-1 rounded text-sm w-full"><option value="">-- اختر صفحة --</option>{pages.map(p => <option key={p} value={p}>{p}</option>)}</select>)}</td>
                                                        <td className="px-4 py-3"><span className="text-green-600 font-bold text-xs">مفعل ✓</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* التبويب الأول: لوحة التحكم */}
                            {currentTab === 'dashboard' && (
                                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <div className="glass-panel p-6 rounded-2xl shadow-sm border border-white flex items-start justify-between hover:shadow-md transition-shadow"><div><p className="text-slate-500 text-sm font-bold mb-1">الطلبات المرئية لك</p><p className="text-4xl font-black text-slate-800">{globalStats.total}</p></div><div className="p-3.5 bg-blue-100 text-blue-600 rounded-2xl"><IconCart /></div></div>
                                        <div className="glass-panel p-6 rounded-2xl shadow-sm border border-white flex items-start justify-between hover:shadow-md transition-shadow"><div><p className="text-slate-500 text-sm font-bold mb-1">قيد المعالجة</p><p className="text-4xl font-black text-slate-800">{globalStats.new}</p></div><div className="p-3.5 bg-amber-100 text-amber-600 rounded-2xl"><IconClock /></div></div>
                                        <div className="glass-panel p-6 rounded-2xl shadow-sm border border-white flex items-start justify-between hover:shadow-md transition-shadow"><div><p className="text-slate-500 text-sm font-bold mb-1">تم التوصيل بنجاح</p><p className="text-4xl font-black text-slate-800">{globalStats.delivered}</p></div><div className="p-3.5 bg-green-100 text-green-600 rounded-2xl"><IconCheck /></div></div>
                                        <div className="glass-panel p-6 rounded-2xl shadow-sm border border-white flex items-start justify-between hover:shadow-md transition-shadow bg-gradient-to-br from-indigo-50 to-white"><div><p className="text-slate-500 text-sm font-bold mb-1">إجمالي الإيرادات</p><p className="text-3xl font-black text-indigo-700">{globalStats.revenue} <span className="text-sm">ج.م</span></p></div><div className="p-3.5 bg-indigo-100 text-indigo-600 rounded-2xl"><IconStore size={24} /></div></div>
                                    </div>

                                    {/* إحصائيات الصفحات القابلة للنقر */}
                                    <div>
                                        <h2 className="font-black text-xl text-slate-800 mb-4 flex items-center gap-2">متابعة الحالات السريعة <span className="text-sm font-bold text-slate-500">(انقر على أي حالة لعرض طلباتها)</span></h2>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                                            {pages.map(page => {
                                                if (userRole.role === 'agent' && userRole.assigned_page !== page) return null;
                                                const pageOrders = filteredOrders.filter(o => o.page === page);
                                                if (pageOrders.length === 0) return null;
                                                return (
                                                    <div key={page} className="glass-panel p-5 rounded-2xl shadow-sm border border-white hover:shadow-md transition-shadow">
                                                        <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3"><h3 className="font-black text-lg text-indigo-900 flex items-center gap-2"><IconStore size={18}/> {page}</h3><span className="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-1 rounded-lg">{pageOrders.length} طلب</span></div>
                                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                                            {orderStatuses.map(status => {
                                                                const count = pageOrders.filter(o => o.status === status).length;
                                                                if (count === 0) return null;
                                                                return (
                                                                    <button key={status} onClick={() => navigateToFilteredOrders(page, status)} className={`flex justify-between items-center px-3 py-2 rounded-xl border text-xs font-bold transition-transform hover:scale-105 ${getRowStatusColor(status)}`} title={`عرض طلبات "${status}" لصفحة ${page}`}>
                                                                        <span className="truncate ml-1">{status}</span><span className="bg-white/90 px-2 py-0.5 rounded shadow-sm text-slate-800">{count}</span>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* التبويب الثاني: الطلبات والمتابعة */}
                            {currentTab === 'orders' && (
                                <div className="flex flex-col h-full space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="glass-panel p-5 rounded-2xl shadow-sm border border-white flex flex-col gap-4 shrink-0">
                                        <div className="flex items-center justify-between mb-1">
                                            <div className="flex items-center gap-2"><IconFilter /> <h3 className="font-bold text-slate-700">تصفية وبحث متقدم</h3></div>
                                            {selectedOrders.length > 0 && (
                                                <div className="flex items-center gap-2">
                                                    <button onClick={exportSelectedToCSV} className="flex items-center gap-1.5 bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl font-bold text-sm shadow-md transition-colors" title="تنزيل الطلبات المحددة في ملف إكسيل"><IconDownload /> إكسيل</button>
                                                    {userRole.role === 'admin' && (
                                                        <button onClick={handleDeleteMultipleOrders} disabled={isDeletingMultiple} className="flex items-center gap-1.5 bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-xl font-bold text-sm shadow-md transition-colors disabled:opacity-50"><IconTrash /> {isDeletingMultiple ? 'جاري المسح...' : `مسح`}</button>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                                            <div className="relative lg:col-span-2"><div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400"><IconSearch /></div><input type="text" placeholder="بحث بالاسم، هاتف، طلب، بوليصة..." className="block w-full pl-3 pr-10 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow text-sm font-semibold" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
                                            <div><select className="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-semibold" value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}><option value="الكل">جميع الحالات</option>{orderStatuses.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                            <div><select className={`w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-semibold ${userRole.role === 'agent' ? 'opacity-70 bg-slate-100 cursor-not-allowed' : ''}`} value={userRole.role === 'agent' ? userRole.assigned_page : filterPage} onChange={(e) => { if(userRole.role === 'admin') setFilterPage(e.target.value) }} disabled={userRole.role === 'agent'}>{userRole.role === 'admin' && <option value="الكل">جميع الصفحات</option>}{pages.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                            <div><button onClick={resetFilters} className="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition-colors border border-slate-200">إلغاء الفلاتر</button></div>
                                        </div>
                                    </div>

                                    <div className="glass-panel rounded-2xl shadow-sm border border-white flex-1 overflow-hidden flex flex-col">
                                        <div className="overflow-x-auto flex-1">
                                            <table className="w-full text-right table-fixed min-w-[1000px]">
                                                <thead className="bg-slate-800 text-white text-sm sticky top-0 z-10 shadow-md">
                                                    <tr>
                                                        <th className="px-3 py-4 w-12 text-center"><input type="checkbox" className="custom-checkbox mx-auto" checked={displayedOrders.length > 0 && selectedOrders.length === displayedOrders.length} onChange={handleSelectAll} /></th>
                                                        <th className="px-3 py-4 font-bold w-1/12">الطلب</th>
                                                        <th className="px-3 py-4 font-bold w-2/12">الاسم / العنوان</th>
                                                        <th className="px-3 py-4 font-bold w-1/12">الموبايل</th>
                                                        <th className="px-3 py-4 font-bold w-2/12">الملحوظات</th>
                                                        <th className="px-3 py-4 font-bold w-2/12">المنتج (الصفحة)</th>
                                                        <th className="px-3 py-4 font-bold w-1/12 text-center">الحالة</th>
                                                        <th className="px-3 py-4 font-bold w-1/12">المبالغ</th>
                                                        <th className="px-3 py-4 font-bold w-2/12">التاريخ / البوليصة</th>
                                                        <th className="px-3 py-4 font-bold w-1/12 text-center">إجراءات</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-white/40">
                                                    {displayedOrders.length > 0 ? displayedOrders.map(order => (
                                                        <tr key={order.id} className={`transition-colors border-b border-white/20 ${selectedOrders.includes(order.id) ? 'bg-indigo-50 border-indigo-200' : getRowStatusColor(order.status)}`}>
                                                            <td className="px-3 py-3 align-top text-center"><input type="checkbox" className="custom-checkbox mx-auto mt-1" checked={selectedOrders.includes(order.id)} onChange={() => handleSelectOrder(order.id)} /></td>
                                                            <td className="px-3 py-3 align-top"><div className="font-black text-sm break-all">{order.id}</div></td>
                                                            <td className="px-3 py-3 align-top whitespace-normal break-words"><div className="font-bold text-sm">{order.customer}</div><div className="text-[11px] font-medium mt-1 leading-tight opacity-80" title={order.address}>{order.address}</div></td>
                                                            <td className="px-3 py-3 align-top"><div className="text-xs font-bold opacity-90" dir="ltr">{order.phone}</div></td>
                                                            <td className="px-3 py-3 align-top whitespace-normal break-words"><div className="text-[11px] font-medium leading-tight opacity-80" title={order.notes}>{order.notes || '-'}</div></td>
                                                            <td className="px-3 py-3 align-top whitespace-normal break-words"><span className={`px-1.5 py-0.5 border rounded text-[9px] font-black mb-1 inline-block shadow-sm bg-white/60`}>{order.page}</span><div className="text-xs font-bold mt-1 leading-snug line-clamp-3" title={order.item}>{order.item}</div></td>
                                                            <td className="px-3 py-3 align-top text-center"><select value={order.status} onChange={(e) => handleStatusChange(order.id, e.target.value)} className={`text-xs rounded-lg w-full px-2 py-1.5 outline-none focus:ring-2 focus:ring-black/20 font-bold cursor-pointer border shadow-sm ${getSelectStatusColor(order.status)}`}>{orderStatuses.map(status => <option key={status} value={status} className="text-slate-800 bg-white">{status}</option>)}</select></td>
                                                            <td className="px-3 py-3 align-top"><div className="text-[10px] opacity-80">شحن: {order.shippingPrice || 0} ج</div><div className="font-black text-sm bg-white/60 inline-block px-2 py-1 mt-1 rounded shadow-sm border border-white/40">{Number(order.productPrice || 0) + Number(order.shippingPrice || 0)} ج</div></td>
                                                            <td className="px-3 py-3 align-top"><div className="text-[11px] font-bold flex items-center gap-1 opacity-90 mb-1.5"><IconCalendar /> {order.date}</div>{order.trackingNumber ? (<div className="text-[11px] font-black flex items-center gap-1 bg-white/50 inline-flex px-1.5 py-0.5 rounded shadow-sm border border-white/40"><IconTruck /> {order.trackingNumber}</div>) : (<div className="text-[10px] font-medium opacity-60">-</div>)}</td>
                                                            <td className="px-3 py-3 align-top"><div className="flex flex-col gap-1.5"><button onClick={() => openViewModal(order)} className="flex items-center justify-center gap-1 text-[11px] font-bold bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 py-1.5 px-2 rounded-lg transition-colors shadow-sm w-full"><IconEye /> عرض</button><button onClick={() => openEditModal(order)} className="flex items-center justify-center gap-1 text-[11px] font-bold bg-white/70 hover:bg-white text-slate-800 border border-slate-300/50 py-1.5 px-2 rounded-lg transition-colors shadow-sm w-full"><IconEdit /> تعديل</button>{userRole.role === 'admin' && (<button onClick={() => handleDeleteOrder(order.id)} className="flex items-center justify-center gap-1 text-[11px] font-bold bg-red-100 hover:bg-red-600 hover:text-white text-red-700 border border-red-200 py-1.5 px-2 rounded-lg transition-colors shadow-sm w-full"><IconTrash /> مسح</button>)}</div></td>
                                                        </tr>
                                                    )) : (<tr><td colSpan="10" className="px-6 py-16 text-center text-slate-500 font-bold text-lg">لا توجد طلبات مطابقة.</td></tr>)}
                                                </tbody>
                                            </table>
                                        </div>
                                        
                                        <div className="px-4 py-3 bg-slate-800 text-white text-sm font-bold shadow-inner flex flex-wrap justify-between items-center gap-4">
                                            <div className="flex items-center gap-4"><span>نتائج الفلتر: {filteredOrders.length} طلب</span>{selectedOrders.length > 0 && <span className="text-indigo-300 bg-indigo-900/50 px-2 py-0.5 rounded">محدد: {selectedOrders.length}</span>}</div>
                                            <div className="flex items-center gap-4 flex-wrap"><div className="flex items-center gap-2"><label className="text-slate-300 text-xs">عرض:</label><select className="bg-slate-700 border border-slate-600 text-white rounded px-2 py-1 outline-none focus:ring-1 focus:ring-indigo-400" value={ordersPerPage} onChange={(e) => { setOrdersPerPage(e.target.value === 'All' ? 'All' : Number(e.target.value)); setCurrentPage(1); }}><option value={50}>50 صف</option><option value={100}>100 صف</option><option value={500}>500 صف</option><option value="All">الكل</option></select></div>{ordersPerPage !== 'All' && totalPages > 1 && (<div className="flex items-center gap-1 bg-slate-700 rounded-lg p-1"><button disabled={currentPage === 1} onClick={() => setCurrentPage(p => Math.max(1, p - 1))} className="px-3 py-1 bg-slate-600 hover:bg-slate-500 disabled:opacity-30 rounded text-xs transition-colors">السابق</button><span className="px-2 text-xs">صفحة {currentPage} من {totalPages}</span><button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} className="px-3 py-1 bg-slate-600 hover:bg-slate-500 disabled:opacity-30 rounded text-xs transition-colors">التالي</button></div>)}</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* التبويب الثالث: إحصائيات الصفحات (يظهر للمدير فقط) */}
                            {currentTab === 'pages' && userRole.role === 'admin' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="glass-panel p-5 rounded-2xl shadow-sm border border-white flex flex-col md:flex-row items-center gap-4 justify-between"><div className="flex items-center gap-2 font-bold text-slate-700"><IconCalendar /> <span>تحديد فترة الإحصائيات:</span></div><div className="flex items-center gap-3 w-full md:w-auto flex-wrap"><div className="flex items-center gap-2 flex-1 md:flex-none"><label className="text-sm text-slate-500">من:</label><input type="date" className="px-3 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold w-full" value={statsDateFrom} onChange={e => setStatsDateFrom(e.target.value)} /></div><div className="flex items-center gap-2 flex-1 md:flex-none"><label className="text-sm text-slate-500">إلى:</label><input type="date" className="px-3 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold w-full" value={statsDateTo} onChange={e => setStatsDateTo(e.target.value)} /></div>{(statsDateFrom || statsDateTo) && (<button onClick={() => { setStatsDateFrom(''); setStatsDateTo(''); }} className="w-full md:w-auto px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 font-bold text-sm rounded-lg border border-red-200 transition-colors">إلغاء الفلتر ✖</button>)}</div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">{pages.map((page, idx) => {
                                        const pageOrders = statsFilteredOrders.filter(o => o.page === page);
                                        const totalShipping = pageOrders.reduce((sum, o) => sum + Number(o.shippingPrice || 0), 0);
                                        const totalProducts = pageOrders.reduce((sum, o) => sum + Number(o.productPrice || 0), 0);
                                        const pageRevenue = totalShipping + totalProducts;
                                        const theme = getThemeClasses(page);
                                        return (
                                            <div key={idx} className={`bg-white rounded-2xl shadow-md border-2 p-6 ${theme.border} transition-all hover:shadow-lg flex flex-col`}><div className="flex items-center gap-4 border-b border-slate-100 pb-4 mb-4"><div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner ${theme.bgLight} ${theme.textPrimary}`}><IconStore size={28} /></div><div><h3 className={`font-black text-2xl ${theme.textPrimary}`}>{page}</h3><p className="text-slate-500 text-sm font-bold mt-1">إجمالي الطلبات: <span className="text-slate-800">{pageOrders.length}</span></p></div></div><div className="mb-6"><p className="text-xs font-bold text-slate-400 mb-3">تفصيل حالات الطلبات</p><div className="grid grid-cols-2 lg:grid-cols-3 gap-2.5">{orderStatuses.map(status => { const count = pageOrders.filter(o => o.status === status).length; const statusColor = getRowStatusColor(status); return (<div key={status} className={`flex justify-between items-center px-2 py-1.5 rounded-lg border text-[11px] font-bold ${statusColor}`}><span className="truncate mr-1">{status}</span><span className="bg-white/80 px-1.5 py-0.5 rounded shadow-sm border border-white">{count}</span></div>) })}</div></div><div className="mt-auto bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3"><div className="flex justify-between text-sm items-center"><span className="text-slate-500 font-bold">إجمالي مبالغ المنتجات:</span><span className="font-black text-slate-700 bg-white px-2 py-1 rounded border shadow-sm">{totalProducts} ج</span></div><div className="flex justify-between text-sm items-center"><span className="text-slate-500 font-bold">إجمالي مبالغ الشحن:</span><span className="font-black text-slate-700 bg-white px-2 py-1 rounded border shadow-sm">{totalShipping} ج</span></div><div className="pt-3 border-t border-slate-200 flex justify-between text-lg items-center"><span className="text-slate-800 font-black">الإجمالي الكلي:</span><span className="font-black text-green-600 bg-green-50 px-3 py-1 rounded-lg border border-green-200 shadow-sm">{pageRevenue} ج.م</span></div></div></div>
                                        )
                                    })}</div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* نافذة رسالة النجاح (الواتساب) */}

                                        <div className="md:col-span-2 p-4 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-between text-white shadow-inner"><span className="text-sm font-bold text-slate-300">الإجمالي النهائي المطلوب:</span><span className="font-black text-2xl tracking-wide">{(Number(newOrder.shippingPrice) || 0) + (Number(newOrder.productPrice) || 0)} <span className="text-sm font-normal text-slate-400">ج.م</span></span></div>
                                        <div className="md:col-span-2 pt-2 border-t border-slate-200"><label className="block text-sm font-black text-slate-700 mb-1.5 flex items-center gap-2"><IconCalendar /> 10. تاريخ الطلب</label><input type="date" className={`w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-shadow font-bold ${currentTheme.ringFocus} focus:ring-2`} value={newOrder.date || ''} onChange={e => setNewOrder({...newOrder, date: e.target.value})} /><p className="text-xs font-bold text-slate-400 mt-1">يُترك فارغاً ليتم تسجيل تاريخ اليوم تلقائياً.</p></div>
                                        <div className="md:col-span-2 pt-4 mt-2 border-t-2 border-dashed border-slate-200"><label className="block text-sm font-black text-teal-700 mb-2 flex items-center gap-2"><IconTruck /> 11. رقم بوليصة الشحن (تتبع الأوردر)</label><input type="text" placeholder="يُكتب هنا رقم البوليصة لتتبع الأوردر..." className={`w-full px-4 py-3 border-2 border-teal-200 bg-teal-50/50 rounded-xl outline-none transition-shadow font-bold text-teal-900 focus:ring-2 focus:ring-teal-500`} value={newOrder.trackingNumber || ''} onChange={e => setNewOrder({...newOrder, trackingNumber: e.target.value})} /><p className="text-xs font-bold text-slate-400 mt-2">ملاحظة: البنت المسؤولة عن الشحن ستضيف هذا الرقم لاحقاً عند تعديل الطلب.</p></div>
                                    </div>
                                    <div className="pt-4 flex gap-4">
                                        <button type="submit" className={`flex-1 font-black text-lg py-4 rounded-xl transition-all shadow-md transform hover:-translate-y-1 ${currentTheme.btnPrimary}`}>{isEditing ? 'حفظ تعديلات الطلب' : 'تأكيد وإضافة الطلب'}</button>
                                        <button type="button" onClick={closeModal} className={`flex-none px-8 font-black py-4 rounded-xl transition-all bg-white border-2 hover:bg-slate-50 ${currentTheme.border} ${currentTheme.textPrimary}`}>إلغاء</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
