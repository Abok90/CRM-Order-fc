    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f8fafc; 
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f8fafc; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            width: 1.25em; height: 1.25em;
            border: 2px solid #cbd5e1; border-radius: 0.3em;
            display: grid; place-content: center; cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .custom-checkbox::before {
            content: ""; width: 0.65em; height: 0.65em; transform: scale(0);
            box-shadow: inset 1em 1em white; background-color: white;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked { background-color: #4f46e5; border-color: #4f46e5; }
        .custom-checkbox:checked::before { transform: scale(1); }
        
        .copy-animation { animation: pulse-copy 0.5s ease-out; }
        @keyframes pulse-copy {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #dcfce7; color: #166534; border-color: #86efac; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const { createClient } = window.supabase;

        // ==========================================
        // 1. إعدادات قاعدة البيانات Supabase
        // ==========================================
        const SUPABASE_URL = 'https://tdprtlvogzfzfckpvkpa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcHJ0bHZvZ3pmemZja3B2a3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTUwMTcsImV4cCI6MjA4ODQ3MTAxN30.0TrcH65HQO5gboqsNfadSCGZQ95anY_0Bz97db5dPBg';
        
        let supabase = null;
        if (SUPABASE_URL.startsWith('http')) {
            supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // ==========================================
        // 2. مكونات الأيقونات (SVG Icons)
        // ==========================================
        const IconPackage = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
        const IconDashboard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const IconStore = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></svg>;
        const IconPlus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSearch = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconCheck = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconClock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconMenu = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>;
        const IconX = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconCalc = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const IconEdit = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconTruck = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="15" height="10" x="3" y="8" rx="2"/><path d="M18 8h2a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><circle cx="7" cy="20" r="2"/><circle cx="17" cy="20" r="2"/></svg>;
        const IconFilter = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconCalendar = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconUpload = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconEye = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconCopy = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const IconLogOut = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const IconUsers = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconDownload = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

        // ==========================================
        // 3. المكون الرئيسي (App)
        // ==========================================
        function App() {
            // -- حالة المصادقة --
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(null); 
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authLoading, setAuthLoading] = useState(true);
            const [authError, setAuthError] = useState('');

            // -- حالة الواجهة --
            const [initialLoad, setInitialLoad] = useState(true);
            const [loadingDB, setLoadingDB] = useState(false);
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // -- نوافذ (Modals) --
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [originalOrderId, setOriginalOrderId] = useState(null); 
            const [isViewModalOpen, setIsViewModalOpen] = useState(false);
            const [viewOrder, setViewOrder] = useState(null);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [successOrderMessage, setSuccessOrderMessage] = useState(null); 
            const [copiedType, setCopiedType] = useState('');
            const [quickTracking, setQuickTracking] = useState(''); 
            const [quickStatus, setQuickStatus] = useState(''); 
            
            // -- البيانات --
            const [orders, setOrders] = useState([]);
            const ordersRef = useRef([]); // لحفظ نسخة سريعة من البيانات
            const [usersList, setUsersList] = useState([]);
            
            // -- الفلاتر --
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('الكل');
            const [filterPage, setFilterPage] = useState('الكل');
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [statsDateFrom, setStatsDateFrom] = useState('');
            const [statsDateTo, setStatsDateTo] = useState('');
            const [selectedOrders, setSelectedOrders] = useState([]);
            const [isDeletingMultiple, setIsDeletingMultiple] = useState(false);
            const [searchResults, setSearchResults] = useState([]); 
            const [isSearchingDb, setIsSearchingDb] = useState(false); 

            // -- الصفحات والاستيراد --
            const [ordersPerPage, setOrdersPerPage] = useState(100);
            const [currentPage, setCurrentPage] = useState(1);
            const [csvHeaders, setCsvHeaders] = useState([]);
            const [csvData, setCsvData] = useState([]);
            const [importProgress, setImportProgress] = useState(0);
            const [importStatusText, setImportStatusText] = useState(""); 
            const [isImporting, setIsImporting] = useState(false);
            const [importTargetPage, setImportTargetPage] = useState('عايدة'); 
            const [columnMapping, setColumnMapping] = useState({
                id: '', customer: '', phone: '', address: '', item: '', productPrice: '', shippingPrice: '', trackingNumber: '', status: '', date: '', notes: ''
            });
            const fileInputRef = useRef(null);

            // -- الآلة الحاسبة --
            const [showCalc, setShowCalc] = useState(false);
            const [calcExp, setCalcExp] = useState('');

            // -- الثوابت --
            const pages = ['عايدة', 'عايدة ويب', 'اوفر', 'اوفر ويب'];
            const orderStatuses = ['جاري التحضير', 'تم', 'الشحن', 'مراجعة', 'استبدال', 'مرتجع', 'الغاء', 'تاجيل', 'اعادة ارسال', 'خارجي'];
            const initialOrderState = {
                id: '', customer: '', address: '', phone: '', notes: '', page: pages[0], item: '', productPrice: '', shippingPrice: '', trackingNumber: '', status: 'جاري التحضير', date: ''
            };
            const [newOrder, setNewOrder] = useState(initialOrderState);

            // ==========================================
            // 4. دوال الاتصال الأساسية
            // ==========================================

            const fetchUserRole = async (userId) => {
                try {
                    const { data, error } = await supabase.from('user_roles').select('*').eq('id', userId).maybeSingle();
                    if (data) {
                        setUserRole(data);
                        if (data.role === 'agent' && data.assigned_page) {
                            setFilterPage(data.assigned_page);
                            setNewOrder(prev => ({...prev, page: data.assigned_page}));
                            setImportTargetPage(data.assigned_page);
                        }
                    } else {
                        const { data: newRole } = await supabase.from('user_roles').insert([{ id: userId, name: 'المدير', role: 'admin' }]).select().maybeSingle();
                        setUserRole(newRole || { id: userId, name: 'المدير', role: 'admin' });
                    }
                } catch (error) { 
                    setUserRole({ id: userId, name: 'المدير (افتراضي)', role: 'admin' }); 
                } finally { 
                    setAuthLoading(false); 
                }
            };

            const fetchOrdersData = useCallback(async () => {
                if (!user) return;
                setLoadingDB(true);
                try {
                    const { data, error } = await supabase.from('orders').select('*').limit(2000); 
                    if (error) throw error;
                    if (data) {
                        const sortedData = data.sort((a, b) => {
                            const timeA = new Date(a.created_at || a.createdAt || a.date || 0).getTime() || 0;
                            const timeB = new Date(b.created_at || b.createdAt || b.date || 0).getTime() || 0;
                            return timeB - timeA;
                        });
                        const safeOrders = sortedData.map(o => ({
                            ...o,
                            productPrice: Number(o.productPrice) || 0,
                            shippingPrice: Number(o.shippingPrice) || 0
                        }));
                        setOrders(safeOrders);
                        ordersRef.current = safeOrders;
                    }
                } catch (error) { 
                    console.error("Fetch orders error:", error);
                } finally { 
                    setLoadingDB(false);
                    setInitialLoad(false);
                }
            }, [user]);

            const fetchUsersList = async () => {
                try {
                    const { data, error } = await supabase.from('user_roles').select('*');
                    if (!error && data) setUsersList(data);
                } catch (error) {}
            };

            const searchDatabase = async (searchText) => {
                if (!user || String(searchText).trim() === '') { setSearchResults([]); return; }
                setIsSearchingDb(true);
                try {
                    const { data, error } = await supabase.from('orders').select('*')
                        .or(`customer.ilike.%${searchText}%,phone.ilike.%${searchText}%,id.ilike.%${searchText}%,"trackingNumber".ilike.%${searchText}%`)
                        .limit(1000); 
                    if (error) throw error;
                    setSearchResults(data || []);
                } catch (err) { 
                    console.error("Error searching:", err); 
                } finally { 
                    setIsSearchingDb(false); 
                }
            };

            // ==========================================
            // 5. الـ useEffects الأساسية
            // ==========================================

            useEffect(() => {
                let mounted = true;
                const initSession = async () => {
                    try {
                        const { data: { session } } = await supabase.auth.getSession();
                        if (mounted) {
                            if (session?.user) {
                                setUser(session.user);
                                await fetchUserRole(session.user.id);
                            } else {
                                setAuthLoading(false);
                            }
                        }
                    } catch (err) {
                        if (mounted) setAuthLoading(false);
                    }
                };
                initSession();

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    if (mounted) {
                        if (session?.user) {
                            setUser(session.user);
                            fetchUserRole(session.user.id);
                        } else {
                            setUser(null);
                            setUserRole(null);
                            setOrders([]);
                            setAuthLoading(false);
                        }
                    }
                });

                return () => {
                    mounted = false;
                    subscription?.unsubscribe();
                };
            }, []);

            useEffect(() => {
                if (user && userRole) {
                    fetchOrdersData();
                    if (userRole.role === 'admin') fetchUsersList();
                }
            }, [user, userRole, fetchOrdersData]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchQuery, filterStatus, filterPage, dateFrom, dateTo]);

            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (searchQuery.length > 2) searchDatabase(searchQuery);
                    else setSearchResults([]); 
                }, 800); 
                return () => clearTimeout(delayDebounceFn);
            }, [searchQuery]);

            // ==========================================
            // 6. تجهيز الفلاتر (useMemos)
            // ==========================================

            const allVisibleOrders = useMemo(() => {
                if (searchResults.length === 0) return orders;
                const combined = [...orders, ...searchResults];
                const unique = new Map();
                combined.forEach(o => unique.set(o.id, o));
                return Array.from(unique.values()).sort((a, b) => {
                    const timeA = new Date(a.created_at || a.createdAt || a.date || 0).getTime() || 0;
                    const timeB = new Date(b.created_at || b.createdAt || b.date || 0).getTime() || 0;
                    return timeB - timeA;
                });
            }, [orders, searchResults]);

            const filteredOrders = useMemo(() => {
                return allVisibleOrders.filter(order => {
                    const search = String(searchQuery).toLowerCase();
                    const matchesSearch = String(order.customer || '').toLowerCase().includes(search) || 
                                          String(order.phone || '').toLowerCase().includes(search) || 
                                          String(order.id || '').toLowerCase().includes(search) || 
                                          String(order.trackingNumber || '').toLowerCase().includes(search);
                                          
                    const matchesStatus = filterStatus === 'الكل' || order.status === filterStatus;
                    const matchesPage = filterPage === 'الكل' || order.page === filterPage;
                    const matchesRole = userRole?.role === 'admin' ? true : order.page === userRole?.assigned_page;
                    const matchesDateFrom = !dateFrom || (order.date && order.date >= dateFrom);
                    const matchesDateTo = !dateTo || (order.date && order.date <= dateTo);

                    return matchesSearch && matchesStatus && matchesPage && matchesRole && matchesDateFrom && matchesDateTo;
                });
            }, [allVisibleOrders, searchQuery, filterStatus, filterPage, userRole, dateFrom, dateTo]);

            const displayedOrders = useMemo(() => {
                if (ordersPerPage === 'All') return filteredOrders;
                const start = (currentPage - 1) * ordersPerPage;
                return filteredOrders.slice(start, start + ordersPerPage);
            }, [filteredOrders, currentPage, ordersPerPage]);

            const totalPages = ordersPerPage === 'All' ? 1 : Math.ceil(filteredOrders.length / ordersPerPage);

            const statsFilteredOrders = useMemo(() => {
                return filteredOrders.filter(order => (!statsDateFrom || order.date >= statsDateFrom) && (!statsDateTo || order.date <= statsDateTo));
            }, [filteredOrders, statsDateFrom, statsDateTo]);

            const globalStats = useMemo(() => {
                const delivered = filteredOrders.filter(o => o.status === 'تم');
                return {
                    total: filteredOrders.length,
                    new: filteredOrders.filter(o => ['جاري التحضير', 'مراجعة', 'تاجيل'].includes(o.status)).length,
                    processing: filteredOrders.filter(o => ['الشحن', 'استبدال', 'اعادة ارسال'].includes(o.status)).length,
                    delivered: delivered.length,
                    revenue: delivered.reduce((sum, o) => sum + (Number(o.productPrice) || 0) + (Number(o.shippingPrice) || 0), 0)
                };
            }, [filteredOrders]);

            // ==========================================
            // 7. دوال التحكم والإضافة (Action Handlers)
            // ==========================================

            const resetFilters = () => { 
                setSearchQuery(''); 
                setFilterStatus('الكل'); 
                setFilterPage(userRole?.role === 'agent' ? userRole.assigned_page : 'الكل'); 
                setDateFrom(''); 
                setDateTo(''); 
                setCurrentPage(1);
            };

            const navigateToFilteredOrders = (page, status) => { 
                setFilterPage(page); 
                setFilterStatus(status); 
                setCurrentTab('orders'); 
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setAuthLoading(true); setAuthError('');
                try {
                    const { error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
                    if (error) throw error;
                } catch (error) { setAuthError("خطأ في تسجيل الدخول. تأكد من البيانات."); setAuthLoading(false); } 
            };

            const handleLogout = async () => { 
                setAuthLoading(true);
                try { await supabase.auth.signOut(); } catch(e) {}
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.replace(window.location.pathname); 
            };

            const handleAddOrEditOrder = async (e) => {
                e.preventDefault(); 
                if (!user) return;

                if (!isEditing && userRole?.role === 'agent' && userRole?.assigned_page !== newOrder.page) {
                    alert(`صلاحياتك تسمح لك بالإضافة في صفحة "${userRole.assigned_page}" فقط.`);
                    return;
                }

                if (!newOrder.customer || String(newOrder.customer).trim() === '') return alert("يرجى إدخال اسم العميل.");
                if (!newOrder.phone || String(newOrder.phone).trim() === '') return alert("يرجى إدخال رقم الهاتف.");
                if (!newOrder.address || String(newOrder.address).trim() === '') return alert("يرجى إدخال العنوان.");
                if (!newOrder.item || String(newOrder.item).trim() === '') return alert("يرجى إدخال تفاصيل المنتج.");

                const finalOrderId = newOrder.id && String(newOrder.id).trim() !== '' ? String(newOrder.id).trim() : `ORD-${Date.now().toString().slice(-6)}`;
                const finalDate = newOrder.date && String(newOrder.date).trim() !== '' ? newOrder.date : new Date().toISOString().split('T')[0];
                
                const orderPayload = { 
                    id: finalOrderId, 
                    customer: newOrder.customer,
                    address: newOrder.address,
                    phone: newOrder.phone,
                    page: newOrder.page || pages[0],
                    item: newOrder.item,
                    status: newOrder.status || 'جاري التحضير',
                    notes: newOrder.notes || '',
                    productPrice: Number(newOrder.productPrice) || 0, 
                    shippingPrice: Number(newOrder.shippingPrice) || 0,
                    trackingNumber: newOrder.trackingNumber || '',
                    date: finalDate,
                    user_id: user.id
                };

                try {
                    if (isEditing) {
                        if (originalOrderId !== finalOrderId) {
                            const { error: insErr } = await supabase.from('orders').insert([orderPayload]);
                            if (insErr) throw insErr;
                            await supabase.from('orders').delete().eq('id', originalOrderId);
                        } else {
                            const updatePayload = { ...orderPayload };
                            delete updatePayload.id; 
                            const { error: updErr } = await supabase.from('orders').update(updatePayload).eq('id', finalOrderId);
                            if (updErr) throw updErr;
                        }
                        alert("تم التعديل بنجاح!");
                        closeModal();
                    } else {
                        const { error: insErr } = await supabase.from('orders').insert([orderPayload]);
                        if (insErr) throw insErr;
                        
                        closeModal();
                        setSuccessOrderMessage(orderPayload); 
                    }
                    fetchOrdersData(); 
                } catch (error) { 
                    console.error("Save error:", error); 
                    alert(`فشل الحفظ: ${error.message}\nتأكد أن رقم الطلب غير مكرر.`); 
                }
            };

            const handleStatusChange = async (id, newStatus) => {
                if (!user) return;
                const previousOrders = [...orders];
                setOrders(prev => prev.map(o => o.id === id ? { ...o, status: newStatus } : o));
                if(viewOrder && viewOrder.id === id) setViewOrder({...viewOrder, status: newStatus});

                try {
                    const { error } = await supabase.from('orders').update({ status: newStatus }).eq('id', id);
                    if(error) throw error;
                } catch (error) { 
                    alert("خطأ في التحديث: " + error.message);
                    setOrders(previousOrders);
                }
            };

            const saveQuickUpdate = async () => {
                 if (!user || !viewOrder) return;
                 try {
                     const { error } = await supabase.from('orders').update({ 
                         trackingNumber: quickTracking, 
                         status: quickStatus 
                     }).eq('id', viewOrder.id);
                     
                     if(error) throw error;
                     
                     setViewOrder({...viewOrder, trackingNumber: quickTracking, status: quickStatus});
                     setOrders(prev => prev.map(o => o.id === viewOrder.id ? { ...o, trackingNumber: quickTracking, status: quickStatus } : o));
                     alert("تم الحفظ بنجاح!");
                 } catch (error) { 
                     alert("فشل الحفظ: " + error.message); 
                 }
            };

            const handleDeleteOrder = async (id) => {
                if (!user) return;
                if (!window.confirm(`هل أنت متأكد من مسح الطلب (${id}) نهائياً؟`)) return;
                
                const exactId = String(id); 
                const previousOrders = [...orders];
                setOrders(prev => prev.filter(o => o.id !== exactId));

                try {
                    const { error } = await supabase.from('orders').delete().eq('id', exactId);
                    if(error) throw error;
                } catch (error) { 
                    alert(`فشل المسح: ${error.message}`);
                    setOrders(previousOrders);
                }
            };

            const handleDeleteMultipleOrders = async () => {
                if (!user || selectedOrders.length === 0) return;
                if (!window.confirm(`هل أنت متأكد من مسح ${selectedOrders.length} طلبات نهائياً؟`)) return;
                
                setIsDeletingMultiple(true);
                const previousOrders = [...orders];
                const idsToDelete = [...selectedOrders];
                
                setOrders(prev => prev.filter(o => !idsToDelete.includes(o.id)));
                setSelectedOrders([]); 

                try {
                    const { error } = await supabase.from('orders').delete().in('id', idsToDelete);
                    if (error) throw error;
                } catch (error) { 
                    alert(`فشل المسح الجماعي: ${error.message}`); 
                    setOrders(previousOrders);
                } finally { 
                    setIsDeletingMultiple(false); 
                }
            };

            // ==========================================
            // 8. النوافذ المنبثقة والمساعدات (CSV)
            // ==========================================
            
            const openAddModal = () => { setNewOrder({ ...initialOrderState, page: userRole?.role === 'agent' ? userRole.assigned_page : pages[0] }); setIsEditing(false); setOriginalOrderId(null); setIsAddModalOpen(true); };
            const openEditModal = (order) => { setNewOrder(order); setIsEditing(true); setOriginalOrderId(order.id); setIsAddModalOpen(true); };
            const closeModal = () => { setIsAddModalOpen(false); setIsEditing(false); setOriginalOrderId(null); setNewOrder(initialOrderState); };
            const openViewModal = (order) => { setViewOrder(order); setQuickTracking(order.trackingNumber || ''); setQuickStatus(order.status || 'جاري التحضير'); setIsViewModalOpen(true); };
            const closeViewModal = () => { setIsViewModalOpen(false); setViewOrder(null); setCopiedType(''); setQuickTracking(''); };

            const copyToClipboard = (text, type) => {
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setCopiedType(type); setTimeout(() => setCopiedType(''), 2000);
            };

            const exportSelectedToCSV = () => {
                if (selectedOrders.length === 0) return;
                const toExport = filteredOrders.filter(o => selectedOrders.includes(o.id));
                const headers = ['رقم الطلب', 'اسم العميل', 'رقم الموبايل', 'العنوان', 'الصفحة', 'المنتج/الوصف', 'حالة الطلب', 'سعر المنتج', 'سعر الشحن', 'رقم البوليصة', 'تاريخ الطلب', 'الملاحظات'];
                const rows = toExport.map(o => [`"${String(o.id || '')}"`, `"${String(o.customer || '').replace(/"/g, '""')}"`, `"${String(o.phone || '').replace(/"/g, '""')}"`, `"${String(o.address || '').replace(/"/g, '""')}"`, `"${String(o.page || '').replace(/"/g, '""')}"`, `"${String(o.item || '').replace(/"/g, '""')}"`, `"${String(o.status || '')}"`, Number(o.productPrice) || 0, Number(o.shippingPrice) || 0, `"${String(o.trackingNumber || '').replace(/"/g, '""')}"`, `"${String(o.date || '')}"`, `"${String(o.notes || '').replace(/"/g, '""')}"`].join(','));
                const content = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `طلبات_محددة_${new Date().toISOString().split('T')[0]}.csv`; link.click();
            };

            const parseCSV = (text) => {
                const result = []; let row = []; let inQuotes = false; let currentVal = '';
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (inQuotes) { if (char === '"') { if (text[i+1] === '"') { currentVal += '"'; i++; } else { inQuotes = false; } } else { currentVal += char; } } 
                    else { if (char === '"') { inQuotes = true; } else if (char === ',') { row.push(currentVal.trim()); currentVal = ''; } else if (char === '\n' || char === '\r') { row.push(currentVal.trim()); result.push(row); row = []; currentVal = ''; if (char === '\r' && text[i+1] === '\n') i++; } else { currentVal += char; } }
                }
                if (currentVal || row.length) { row.push(currentVal.trim()); result.push(row); }
                return result.filter(r => r.some(cell => cell && cell.trim() !== '')); 
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { const text = event.target.result; const parsed = parseCSV(text); if (parsed.length > 0) { setCsvHeaders(parsed[0]); setCsvData(parsed.slice(1)); } };
                reader.readAsText(file, 'UTF-8'); 
            };

            const startImport = async () => {
                if (!user) return;
                setIsImporting(true); setImportProgress(0); setImportStatusText("جاري التنظيف والمعالجة...");

                try {
                    let validRecordsCount = 0;
                    const uniqueRowsMap = new Map();

                    for (let i = 0; i < csvData.length; i++) {
                        const row = csvData[i];
                        const getVal = (sysField) => { const colName = columnMapping[sysField]; if (!colName) return ''; const colIdx = csvHeaders.indexOf(colName); return colIdx !== -1 && row[colIdx] ? String(row[colIdx]).trim() : ''; };

                        let rawId = getVal('id'); let orderId = rawId !== '' ? rawId : `ORD-IMP-${Date.now()}-${i}`;
                        orderId = String(orderId).replace(/[\/\\?%*:|"<>#\s]/g, '-').trim();

                        const priceRaw = getVal('productPrice') || '0'; const shipRaw = getVal('shippingPrice') || '0';
                        const cleanProductPrice = parseFloat(String(priceRaw).replace(/[^\d.-]/g, '')) || 0;
                        const cleanShippingPrice = parseFloat(String(shipRaw).replace(/[^\d.-]/g, '')) || 0;
                        
                        let importedStatus = getVal('status');
                        if(!orderStatuses.includes(importedStatus)) importedStatus = 'جاري التحضير';
                        
                        let rawDate = getVal('date'); let finalDate = new Date().toISOString().split('T')[0];
                        if (rawDate && String(rawDate).trim() !== '') {
                            let cleanDateStr = String(rawDate).replace(/\//g, '-').replace(/\./g, '-');
                            let parsedDate = new Date(cleanDateStr);
                            if (!isNaN(parsedDate.getTime())) finalDate = parsedDate.toISOString().split('T')[0];
                        }

                        const orderData = {
                            id: orderId, customer: getVal('customer') || 'غير محدد', phone: getVal('phone') || '',
                            address: getVal('address') || '', notes: getVal('notes') || '', page: importTargetPage, 
                            item: getVal('item') || 'مستورد من إكسيل', productPrice: cleanProductPrice,
                            shippingPrice: cleanShippingPrice, trackingNumber: getVal('trackingNumber') || '',
                            status: importedStatus, date: finalDate, user_id: user.id
                        };
                        uniqueRowsMap.set(orderId, orderData);
                    }
                    
                    const uniqueDataToInsert = Array.from(uniqueRowsMap.values());
                    validRecordsCount = uniqueDataToInsert.length;

                    setImportStatusText(`جاري رفع ${validRecordsCount} طلب للسيرفر...`);

                    const chunkSize = 200; 
                    for (let i = 0; i < uniqueDataToInsert.length; i += chunkSize) {
                        const chunk = uniqueDataToInsert.slice(i, i + chunkSize);
                        const { error } = await supabase.from('orders').upsert(chunk, { onConflict: 'id' });
                        if (error) throw error;
                        setImportProgress(Math.round(((i + chunk.length) / uniqueDataToInsert.length) * 100));
                    }

                    setImportStatusText("تم الرفع بنجاح!");
                    fetchOrdersData(); 
                    setIsImporting(false); setIsImportModalOpen(false); setCsvHeaders([]); setCsvData([]);
                    alert(`تم استيراد ${validRecordsCount} أوردر بنجاح!`);
                } catch (err) {
                    alert(`فشل الرفع: ${err.message}`); 
                    setIsImporting(false);
                }
            };

            const handleSelectAll = (e) => { e.target.checked ? setSelectedOrders(displayedOrders.map(o => o.id)) : setSelectedOrders([]); };
            const handleSelectOrder = (id) => { selectedOrders.includes(id) ? setSelectedOrders(selectedOrders.filter(o => o !== id)) : setSelectedOrders([...selectedOrders, id]); };

            const handleCalcBtn = (btn) => {
                if (btn === 'C') { setCalcExp(''); setNewOrder({ ...newOrder, productPrice: '' }); } 
                else if (btn === '=') { try { const result = new Function('return ' + calcExp)(); setCalcExp(String(result)); setNewOrder({ ...newOrder, productPrice: result }); setShowCalc(false); } catch (e) { setCalcExp('خطأ'); } } 
                else { setCalcExp((prev) => (prev === 'خطأ' ? btn : prev + btn)); }
            };
            const calcButtons = ['7', '8', '9', '/', '4', '5', '6', '*', '1', '2', '3', '-', 'C', '0', '=', '+'];

            const getThemeClasses = (p) => (p === 'عايدة' || p === 'عايدة ويب' ? { btnPrimary: 'bg-pink-600 hover:bg-pink-700 text-white shadow-md shadow-pink-200', textPrimary: 'text-pink-600', border: 'border-pink-200', bgLight: 'bg-pink-50', ringFocus: 'focus:ring-pink-500' } : { btnPrimary: 'bg-purple-600 hover:bg-purple-700 text-white shadow-md shadow-purple-200', textPrimary: 'text-purple-600', border: 'border-purple-200', bgLight: 'bg-purple-50', ringFocus: 'focus:ring-purple-500' });
            
            const getRowStatusColor = (status) => {
                switch(status) {
                    case 'جاري التحضير': return 'bg-amber-50 hover:bg-amber-100 text-amber-900 border-amber-200';
                    case 'تم': return 'bg-green-50 hover:bg-green-100 text-green-900 border-green-200';
                    case 'الشحن': return 'bg-blue-50 hover:bg-blue-100 text-blue-900 border-blue-200';
                    case 'مراجعة': return 'bg-yellow-50 hover:bg-yellow-100 text-yellow-900 border-yellow-200';
                    case 'استبدال': return 'bg-purple-50 hover:bg-purple-100 text-purple-900 border-purple-200';
                    case 'مرتجع': return 'bg-red-50 hover:bg-red-100 text-red-900 border-red-200';
                    case 'الغاء': return 'bg-slate-200 hover:bg-slate-300 text-slate-800 border-slate-300';
                    case 'تاجيل': return 'bg-orange-50 hover:bg-orange-100 text-orange-900 border-orange-200';
                    case 'اعادة ارسال': return 'bg-indigo-50 hover:bg-indigo-100 text-indigo-900 border-indigo-200';
                    case 'خارجي': return 'bg-teal-50 hover:bg-teal-100 text-teal-900 border-teal-200';
                    default: return 'bg-white hover:bg-slate-50 text-slate-800 border-slate-200';
                }
            };
            
            const getSelectStatusColor = (status) => {
                 switch(status) {
                    case 'جاري التحضير': return 'text-amber-800 border-amber-300 bg-white/60';
                    case 'تم': return 'text-green-800 border-green-300 bg-white/60';
                    case 'الشحن': return 'text-blue-800 border-blue-300 bg-white/60';
                    case 'مراجعة': return 'text-yellow-800 border-yellow-300 bg-white/60';
                    case 'استبدال': return 'text-purple-800 border-purple-300 bg-white/60';
                    case 'مرتجع': return 'text-red-800 border-red-300 bg-white/60';
                    case 'الغاء': return 'text-slate-700 border-slate-400 bg-white/60';
                    case 'تاجيل': return 'text-orange-800 border-orange-300 bg-white/60';
                    case 'اعادة ارسال': return 'text-indigo-800 border-indigo-300 bg-white/60';
                    case 'خارجي': return 'text-teal-800 border-teal-300 bg-white/60';
                    default: return 'text-slate-800 border-slate-300 bg-white/60';
                }
            };

            // ==========================================
            // 9. واجهة المستخدم (Rendering)
            // ==========================================

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-50"><div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div></div>;

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                            <div className="flex justify-center mb-6 text-indigo-600"><IconPackage size={64} /></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">تسجيل الدخول للنظام</h2>
                            <p className="text-slate-500 font-bold mb-6 text-sm">أول حساب يسجل سيتم تعيينه كـ (مدير) تلقائياً.</p>
                            {authError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold mb-4">{authError}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div><label className="block text-sm font-bold text-slate-700 mb-1 text-right">البريد الإلكتروني</label><input type="email" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-left" dir="ltr" value={authEmail} onChange={e => setAuthEmail(e.target.value)} /></div>
                                <div><label className="block text-sm font-bold text-slate-700 mb-1 text-right">كلمة المرور</label><input type="password" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-left" dir="ltr" value={authPassword} onChange={e => setAuthPassword(e.target.value)} /></div>
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl transition-colors mt-2 shadow-md">دخول إلى لوحة التحكم</button>
                            </form>
                            <div className="mt-6 text-center border-t border-slate-100 pt-4">
                                <p className="text-xs font-bold text-slate-400 mb-2">لإنشاء حسابات للموظفين:</p>
                                <button onClick={() => {
                                    const email = prompt("أدخل إيميل الموظف الجديد:");
                                    const password = prompt("أدخل باسورد مؤقت (6 أحرف على الأقل):");
                                    if(email && password) { supabase.auth.signUp({email, password}).then(({data, error}) => { if(error) alert(error.message); else alert("تم إنشاء الحساب بنجاح! يُرجى الدخول بحساب المدير لتفعيل صلاحياته."); }); }
                                }} className="text-sm font-bold text-indigo-600 hover:underline">إنشاء حساب جديد (سريع)</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!userRole) {
                 return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100 text-center">
                            <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
                            <h2 className="text-xl font-black text-slate-800 mb-4">جاري التحقق من الصلاحيات...</h2>
                            <button onClick={handleLogout} className="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold mt-4">تسجيل الخروج (إلغاء العملية)</button>
                        </div>
                    </div>
                 );
            }

            const currentTheme = getThemeClasses(newOrder.page);

            return (
                <div className="flex h-screen overflow-hidden bg-[#f8fafc]">
                    {/* القائمة الجانبية */}
                    <aside className={`fixed inset-y-0 right-0 z-50 w-64 bg-slate-900 text-white transition-transform transform ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative shadow-2xl flex flex-col`}>
                        <div className="flex items-center justify-between p-6 bg-gradient-to-b from-slate-800 to-slate-900 border-b border-slate-700/50">
                            <div className="flex items-center gap-3 font-black text-xl tracking-wide"><div className="p-2 bg-indigo-500/20 rounded-xl text-indigo-400"><IconPackage /></div><span>نظام المبيعات</span></div>
                            <button className="md:hidden text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}><IconX /></button>
                        </div>
                        <div className="p-4 bg-slate-800/50 border-b border-slate-800 flex justify-between items-center">
                            <div className="flex flex-col overflow-hidden"><span className="text-sm font-bold text-white truncate">{userRole.name || 'مستخدم'}</span><span className="text-[10px] text-indigo-300 font-black mt-0.5">{userRole.role === 'admin' ? 'مدير النظام 👑' : `موظف: ${userRole.assigned_page}`}</span></div>
                            <button onClick={handleLogout} className="text-red-400 hover:text-red-300 p-2 bg-slate-800 rounded-lg" title="تسجيل خروج"><IconLogOut /></button>
                        </div>
                        <nav className="p-4 space-y-2 flex-1 overflow-y-auto">
                            <button onClick={() => {setCurrentTab('dashboard'); setIsSidebarOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold ${currentTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}><span><IconDashboard /></span> <span>لوحة التحكم</span></button>
                            <button onClick={() => {setCurrentTab('orders'); setIsSidebarOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold ${currentTab === 'orders' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}><span><IconCart /></span> <span>الطلبات والمتابعة</span></button>
                            {userRole.role === 'admin' && <button onClick={() => {setCurrentTab('pages'); setIsSidebarOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold ${currentTab === 'pages' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}><span><IconStore /></span> <span>إحصائيات الصفحات</span></button>}
                            {userRole.role === 'admin' && <button onClick={() => {setCurrentTab('users'); setIsSidebarOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold mt-4 border border-indigo-500/30 ${currentTab === 'users' ? 'bg-indigo-800 text-white shadow-lg shadow-indigo-900/50' : 'text-indigo-300 hover:bg-slate-800 hover:text-white'}`}><span><IconUsers /></span> <span>إدارة الموظفين</span></button>}
                        </nav>
                    </aside>

                    {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
